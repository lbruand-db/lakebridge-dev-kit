test_cases:
- id: recon_basic_setup_001
  inputs:
    prompt: "How do I set up Lakebridge reconciliation to validate a Snowflake migration to Unity Catalog?"
  outputs:
    response: |
      First install the package in a notebook cell:
      ```bash
      %pip install databricks-labs-lakebridge
      ```

      Then run the reconciliation:
      ```python
      from databricks.sdk import WorkspaceClient
      from databricks.labs.lakebridge.config import (
          ReconcileConfig, DatabaseConfig, ReconcileMetadataConfig, TableRecon
      )
      from databricks.labs.lakebridge.reconcile.recon_config import Table
      from databricks.labs.lakebridge.reconcile.trigger_recon_service import TriggerReconService

      ws = WorkspaceClient()

      table_recon = TableRecon(tables=[
          Table(source_name="orders", target_name="orders", join_columns=["order_id"])
      ])

      reconcile_config = ReconcileConfig(
          data_source="snowflake",
          report_type="all",
          secret_scope="lakebridge_snowflake",
          database_config=DatabaseConfig(
              source_catalog="PROD_DB",
              source_schema="PUBLIC",
              target_catalog="main",
              target_schema="migrated"
          ),
          metadata_config=ReconcileMetadataConfig()
      )

      result = TriggerReconService.trigger_recon(
          ws=ws, spark=spark, table_recon=table_recon, reconcile_config=reconcile_config
      )
      ```
    execution_success: true
  expectations:
    expected_facts:
    - "Lakebridge is installed via pip install databricks-labs-lakebridge"
    - "ReconcileConfig defines global settings including data_source, report_type, and secret_scope"
    - "TableRecon wraps a list of Table objects defining which tables to reconcile"
    - "TriggerReconService.trigger_recon() executes the reconciliation"
    - "Secret scope lakebridge_snowflake stores Snowflake credentials"
    expected_patterns:
    - pattern: "databricks-labs-lakebridge"
      min_count: 1
      description: "Installs the Lakebridge package"
    - pattern: "ReconcileConfig"
      min_count: 1
      description: "Uses ReconcileConfig for global settings"
    - pattern: "TableRecon"
      min_count: 1
      description: "Uses TableRecon for table definitions"
    - pattern: "TriggerReconService"
      min_count: 1
      description: "Uses TriggerReconService to run reconciliation"
    - pattern: "data_source.*snowflake"
      min_count: 1
      description: "Configures Snowflake as the data source"
    guidelines:
    - "Must import from databricks.labs.lakebridge.config, not from recon_config"
    - "Must include ReconcileConfig with data_source, report_type, secret_scope, database_config"
    - "Must show TriggerReconService.trigger_recon() call"
  metadata:
    category: happy_path
    difficulty: easy
    source: auto_generated

- id: recon_yaml_config_002
  inputs:
    prompt: "Generate the YAML configuration files for reconciling Oracle tables to Databricks."
  outputs:
    response: |
      **reconcile.yml:**
      ```yaml
      version: 1
      data_source: oracle
      report_type: all
      secret_scope: lakebridge_oracle
      database_config:
        source_schema: HR
        target_catalog: main
        target_schema: hr_migrated
      metadata_config:
        catalog: remorph
        schema: reconcile
        volume: reconcile_volume
      ```

      **recon_config.yml:**
      ```yaml
      version: 2
      tables:
        - source_name: employees
          target_name: employees
          join_columns: [employee_id]
        - source_name: departments
          target_name: departments
          join_columns: [department_id]
      ```
    execution_success: true
  expectations:
    expected_facts:
    - "Lakebridge uses two YAML config files: reconcile.yml and recon_config.yml"
    - "reconcile.yml version is 1 and recon_config.yml version is 2"
    - "reconcile.yml defines data_source, report_type, secret_scope, and database_config"
    - "recon_config.yml contains a tables list with source_name, target_name, and join_columns"
    - "Default secret scope for Oracle is lakebridge_oracle"
    expected_patterns:
    - pattern: "reconcile\\.yml"
      min_count: 1
      description: "References the reconcile.yml config file"
    - pattern: "recon_config\\.yml"
      min_count: 1
      description: "References the recon_config.yml config file"
    - pattern: "version: 1"
      min_count: 1
      description: "Uses correct version for reconcile.yml"
    - pattern: "version: 2"
      min_count: 1
      description: "Uses correct version for recon_config.yml"
    - pattern: "data_source: oracle"
      min_count: 1
      description: "Sets Oracle as the data source"
    guidelines:
    - "Must generate both reconcile.yml and recon_config.yml"
    - "reconcile.yml must use version 1, recon_config.yml must use version 2"
    - "Must include metadata_config with catalog, schema, and volume"
  metadata:
    category: happy_path
    difficulty: easy
    source: auto_generated

- id: recon_column_mapping_003
  inputs:
    prompt: "My source table has columns named p_id and p_name but the target uses product_id and product_name. How do I configure column mapping for Lakebridge reconciliation?"
  outputs:
    response: |
      ```python
      from databricks.labs.lakebridge.reconcile.recon_config import Table, ColumnMapping

      table = Table(
          source_name="products",
          target_name="products",
          join_columns=["p_id"],
          column_mapping=[
              ColumnMapping(source_name="p_id", target_name="product_id"),
              ColumnMapping(source_name="p_name", target_name="product_name"),
          ],
      )
      ```

      Or in YAML:
      ```yaml
      tables:
        - source_name: products
          target_name: products
          join_columns: [p_id]
          column_mapping:
            - source_name: p_id
              target_name: product_id
            - source_name: p_name
              target_name: product_name
      ```
    execution_success: true
  expectations:
    expected_facts:
    - "ColumnMapping maps source_name to target_name for columns with different names"
    - "join_columns should use the source column name (p_id, not product_id)"
    - "All column names are auto-lowercased by Lakebridge"
    expected_patterns:
    - pattern: "ColumnMapping"
      min_count: 1
      description: "Uses ColumnMapping for column name mapping"
    - pattern: "source_name.*p_id"
      min_count: 1
      description: "Maps p_id as source column"
    - pattern: "target_name.*product_id"
      min_count: 1
      description: "Maps product_id as target column"
    - pattern: "column_mapping"
      min_count: 1
      description: "Uses column_mapping configuration"
    guidelines:
    - "Must use ColumnMapping with source_name and target_name fields"
    - "join_columns must reference source column names"
    - "Should mention that all column names are auto-lowercased"
  metadata:
    category: happy_path
    difficulty: easy
    source: auto_generated

- id: recon_thresholds_004
  inputs:
    prompt: "How do I set up numeric thresholds for Lakebridge reconciliation? My price columns might have small floating-point differences after migration."
  outputs:
    response: |
      ```python
      from databricks.labs.lakebridge.reconcile.recon_config import (
          Table, ColumnThresholds, Transformation
      )

      table = Table(
          source_name="transactions",
          target_name="transactions",
          join_columns=["txn_id"],
          column_thresholds=[
              ColumnThresholds(
                  column_name="amount",
                  lower_bound="-0.01",
                  upper_bound="0.01",
                  type="decimal"
              ),
              ColumnThresholds(
                  column_name="tax_rate",
                  lower_bound="-1%",
                  upper_bound="1%",
                  type="float"
              ),
          ],
          transformations=[
              Transformation(
                  column_name="amount",
                  source="coalesce(cast(cast(amount as decimal(38,10)) as string), '_null_recon_')",
                  target="coalesce(cast(format_number(cast(amount as decimal(38,10)), 10) as string), '_null_recon_')",
              )
          ],
      )
      ```
    execution_success: true
  expectations:
    expected_facts:
    - "ColumnThresholds defines acceptable variance per column with lower_bound and upper_bound"
    - "Thresholds support both percentage (e.g. '-1%') and absolute (e.g. '-0.01') bounds"
    - "The type field must match SQLGLOT DataType.NUMERIC_TYPES or TEMPORAL_TYPES"
    - "Transformations should handle NULLs explicitly using coalesce"
    expected_patterns:
    - pattern: "ColumnThresholds"
      min_count: 1
      description: "Uses ColumnThresholds for numeric tolerance"
    - pattern: "lower_bound"
      min_count: 1
      description: "Sets lower bound for threshold"
    - pattern: "upper_bound"
      min_count: 1
      description: "Sets upper bound for threshold"
    - pattern: "coalesce"
      min_count: 1
      description: "Handles NULLs with coalesce in transformations"
    guidelines:
    - "Must show both percentage and absolute threshold examples"
    - "Must include transformations for decimal precision normalization"
    - "Transformations must handle NULLs with coalesce"
  metadata:
    category: happy_path
    difficulty: medium
    source: auto_generated

