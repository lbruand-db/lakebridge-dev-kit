- id: recon_filtered_subset_006
  inputs:
    prompt: "I only want to reconcile the last 30 days of data from SQL Server. How do I add filters?"
  outputs:
    response: |
      ```python
      from databricks.labs.lakebridge.reconcile.recon_config import Table, Filters

      table = Table(
          source_name="transactions",
          target_name="transactions",
          join_columns=["txn_id"],
          filters=Filters(
              source="txn_date >= DATEADD(day, -30, GETDATE())",
              target="txn_date >= date_sub(current_date(), 30)",
          ),
      )
      ```
    execution_success: true
  expectations:
    expected_facts:
    - "Filters apply WHERE clauses to source and target independently"
    - "Filter expressions use dialect-specific SQL (DATEADD/GETDATE for SQL Server, date_sub for Databricks)"
    - "Source and target filters can have different SQL syntax for the same logical condition"
    expected_patterns:
    - pattern: "Filters"
      min_count: 1
      description: "Uses Filters for WHERE clause configuration"
    - pattern: "source.*DATEADD|source.*dateadd"
      min_count: 1
      description: "Uses SQL Server dialect for source filter"
    - pattern: "target.*date_sub|target.*current_date"
      min_count: 1
      description: "Uses Databricks dialect for target filter"
    guidelines:
    - "Must show dialect-specific SQL in source and target filters"
    - "Source filter must use SQL Server syntax (DATEADD, GETDATE)"
    - "Target filter must use Databricks SQL syntax (date_sub, current_date)"
  metadata:
    category: happy_path
    difficulty: medium
    source: auto_generated

- id: recon_aggregate_validation_007
  inputs:
    prompt: "How can I validate aggregate metrics like SUM and COUNT match between source and target without row-level comparison?"
  outputs:
    response: |
      ```python
      from databricks.labs.lakebridge.reconcile.recon_config import Table, Aggregate

      table = Table(
          source_name="sales",
          target_name="sales",
          join_columns=["sale_id"],
          aggregates=[
              Aggregate(type="sum", agg_columns=["revenue"], group_by_columns=["region"]),
              Aggregate(type="count", agg_columns=["sale_id"]),
              Aggregate(type="avg", agg_columns=["unit_price"], group_by_columns=["product_category"]),
          ],
      )
      ```
    execution_success: true
  expectations:
    expected_facts:
    - "Aggregate reconciliation compares aggregate metrics between source and target"
    - "Supported aggregate functions include min, max, count, sum, avg, mean, mode, stddev, variance, median"
    - "Aggregates can include group_by_columns for dimensional breakdown"
    - "select_columns and drop_columns are not applied to aggregate reconciliation"
    expected_patterns:
    - pattern: "Aggregate"
      min_count: 1
      description: "Uses Aggregate for metric comparison"
    - pattern: "agg_columns"
      min_count: 1
      description: "Specifies columns to aggregate"
    - pattern: "group_by_columns"
      min_count: 1
      description: "Specifies grouping dimensions"
    - pattern: "type.*sum|type.*count|type.*avg"
      min_count: 2
      description: "Uses multiple aggregate types"
    guidelines:
    - "Must show at least two different aggregate types"
    - "Must include at least one aggregate with group_by_columns"
    - "Should mention supported aggregate functions"
  metadata:
    category: happy_path
    difficulty: medium
    source: auto_generated

