- id: recon_interpret_results_009
  inputs:
    prompt: "My Lakebridge reconciliation ran. How do I check the results and find mismatches?"
  outputs:
    response: |
      ```sql
      -- Check overall status
      SELECT * FROM remorph.reconcile.main_metrics
      WHERE recon_id = '<your_recon_id>';

      -- Find rows missing in target
      SELECT * FROM remorph.reconcile.missing_in_tgt
      WHERE recon_id = '<your_recon_id>';

      -- Find column-level mismatches
      SELECT * FROM remorph.reconcile.mismatch_data
      WHERE recon_id = '<your_recon_id>';

      -- Check schema differences
      SELECT * FROM remorph.reconcile.schema_comparison
      WHERE recon_id = '<your_recon_id>'
        AND is_valid = false;
      ```
    execution_success: true
  expectations:
    expected_facts:
    - "Reconciliation results are stored in the metadata catalog/schema (default remorph.reconcile)"
    - "Each reconciliation run has a unique recon_id for tracking"
    - "Key output tables include main_metrics, missing_in_tgt, missing_in_src, mismatch_data, and schema_comparison"
    expected_patterns:
    - pattern: "remorph\\.reconcile"
      min_count: 1
      description: "Queries the default metadata schema"
    - pattern: "recon_id"
      min_count: 2
      description: "Filters by reconciliation run ID"
    - pattern: "main_metrics"
      min_count: 1
      description: "Queries main metrics table"
    - pattern: "missing_in_tgt"
      min_count: 1
      description: "Queries missing rows table"
    - pattern: "mismatch_data"
      min_count: 1
      description: "Queries mismatch data table"
    guidelines:
    - "Must query remorph.reconcile tables (the default metadata location)"
    - "Must filter by recon_id"
    - "Must show queries for main_metrics, missing rows, and mismatch data"
  metadata:
    category: happy_path
    difficulty: easy
    source: auto_generated

- id: recon_jdbc_large_table_010
  inputs:
    prompt: "How do I configure JDBC reader options for reconciling a very large Oracle table with 100 million rows?"
  outputs:
    response: |
      ```python
      from databricks.labs.lakebridge.reconcile.recon_config import Table, JdbcReaderOptions

      table = Table(
          source_name="fact_orders",
          target_name="fact_orders",
          join_columns=["order_id"],
          jdbc_reader_options=JdbcReaderOptions(
              number_partitions=200,
              partition_column="order_id",
              lower_bound="1",
              upper_bound="100000000",
              fetch_size=10000,
          ),
      )
      ```
    execution_success: true
  expectations:
    expected_facts:
    - "JdbcReaderOptions controls parallel reads from JDBC sources"
    - "partition_column should be a high-cardinality numeric column"
    - "number_partitions controls the degree of parallelism"
    - "fetch_size controls rows per JDBC round-trip (default is 100)"
    expected_patterns:
    - pattern: "JdbcReaderOptions"
      min_count: 1
      description: "Uses JdbcReaderOptions for parallel reads"
    - pattern: "number_partitions"
      min_count: 1
      description: "Configures partition count"
    - pattern: "partition_column"
      min_count: 1
      description: "Specifies column for partitioning"
    - pattern: "fetch_size"
      min_count: 1
      description: "Configures JDBC fetch size"
    guidelines:
    - "Must use JdbcReaderOptions with all required fields"
    - "Should recommend a high-cardinality column for partition_column"
    - "Should explain the relationship between number_partitions and cluster size"
  metadata:
    category: happy_path
    difficulty: medium
