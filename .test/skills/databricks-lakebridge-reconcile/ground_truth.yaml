- id: recon_report_type_selection_012
  inputs:
    prompt: "What are the different report types in Lakebridge reconciliation and when should I use each?"
  outputs:
    response: |
      | Type | Purpose | Join columns required | Use when |
      |------|---------|----------------------|----------|
      | `schema` | Compare table schemas | No | Quick sanity check after migration |
      | `row` | Hash-based row matching | No | Verify row counts without column-level detail |
      | `data` | Row + column-level comparison | Yes | Full data validation with mismatch details |
      | `all` | Schema + data combined | Yes | Complete post-migration validation |

      Start with `schema` for a fast check, then use `data` or `all` for full validation.
    execution_success: true
  expectations:
    expected_facts:
    - "Lakebridge supports four report types: schema, row, data, and all"
    - "schema report only compares table structure, not data content"
    - "data report requires join_columns for row matching"
    - "all report combines both schema and data comparison"
    - "row report uses hash-based matching without join columns"
    expected_patterns:
    - pattern: "schema"
      min_count: 2
      description: "Describes schema report type"
    - pattern: "data"
      min_count: 2
      description: "Describes data report type"
    - pattern: "join_columns"
      min_count: 1
      description: "Mentions join_columns requirement"
    guidelines:
    - "Must describe all four report types: schema, row, data, all"
    - "Must explain when to use each type"
    - "Must note which types require join_columns"
  metadata:
    category: happy_path
    difficulty: easy
    source: auto_generated
